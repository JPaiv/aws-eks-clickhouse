# The identity ClickHouse's pods run as on the spoke. It must pre-exist — the
# operator does NOT create it, and a missing SA silently leaves the pods on
# `default` (no S3 permissions → 403s that look like a policy bug).
#
# Its AWS credentials come from the PodIdentityAssociation in
# apps/spokes/dev-clickhouse/s3-podidentityassociation.yaml, which binds this
# SA to the per-en1-dev-clickhouse-s3 role. No IRSA annotation: Pod Identity
# needs none.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse
  namespace: clickhouse
