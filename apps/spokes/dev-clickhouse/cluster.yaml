# Spoke cluster per-en1-dev-clickhouse — one manifest, whole cluster
# (ADR-0013). EKS Auto Mode: Karpenter, CNI, EBS CSI, load balancing and
# Pod Identity are all control-plane managed; nothing is installed in-cluster
# before workloads arrive.
#
# Literal ARNs/subnet IDs: Terramate globals do not reach Git-land. Fill the
# placeholders from `task output STACK=stacks/admin/fleet` and
# `task output STACK=stacks/admin/network` after the bootstrap apply.
#
# The Cluster tag is mandatory: the ACK EKS controller's CreateCluster
# permission is conditioned on it (ADR-0013's tagging convention).
apiVersion: eks.services.k8s.aws/v1alpha1
kind: Cluster
metadata:
  name: per-en1-dev-clickhouse
spec:
  name: per-en1-dev-clickhouse
  version: "1.34"
  # Per-spoke fleet role: per-en1-dev-clickhouse-cluster (stacks/admin/fleet)
  roleARN: arn:aws:iam::128990654954:role/per-en1-dev-clickhouse-cluster
  resourcesVPCConfig:
    # The hub VPC's private subnets — spokes share the hub network (ADR-0013)
    subnetIDs:
      - subnet-030a2c6102fb8973d
      - subnet-0ff046a7654e7bb1a
      - subnet-06168d25566488e50
    endpointPrivateAccess: true
    endpointPublicAccess: true
  accessConfig:
    authenticationMode: API
    # The creator is the ACK controller role; humans and Argo get their own
    # AccessEntry manifests instead.
    bootstrapClusterCreatorAdminPermissions: false
  # Auto Mode replaces the self-managed addon set entirely.
  bootstrapSelfManagedAddons: false
  computeConfig:
    enabled: true
    nodePools:
      - general-purpose
      - system
    # Per-spoke fleet role: per-en1-dev-clickhouse-node (stacks/admin/fleet)
    nodeRoleARN: arn:aws:iam::128990654954:role/per-en1-dev-clickhouse-node
  storageConfig:
    blockStorage:
      enabled: true
  kubernetesNetworkConfig:
    elasticLoadBalancing:
      enabled: true
  tags:
    Cluster: per-en1-dev-clickhouse
    Project: aws-eks-clickhouse
    ManagedBy: ack
