# Argo CD cluster registration for the spoke. The `server` key is
# deliberately not committed — an ACK FieldExport creates it from the
# Cluster's status once the cluster is ACTIVE, and a committed value (even
# empty) would be re-applied over the exported one on every sync: apply
# works on `stringData` while the spokes Application's ignoreDifferences
# guards `/data/server`, and the two never meet.
#
# awsAuthConfig has no roleARN: Argo's pods authenticate with their ambient
# Pod Identity credentials (per-en1-admin-ack-argocd); authorization is the
# AccessEntry next to this file.
#
# tlsClientConfig carries the spoke's real CA (task fleet:harden), closing
# the insecure-birth window documented in ADR-0013.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-per-en1-dev-clickhouse
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    fleet: spoke
    stage: dev
type: Opaque
stringData:
  name: per-en1-dev-clickhouse
  config: |
    {
      "awsAuthConfig": {
        "clusterName": "per-en1-dev-clickhouse"
      },
      "tlsClientConfig": {
        "caData": ""
      }
    }
