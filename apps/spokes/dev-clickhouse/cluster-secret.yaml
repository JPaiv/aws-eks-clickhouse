# Argo CD cluster registration for the spoke. The `server` key is empty at
# birth — an ACK FieldExport fills it from the Cluster's status (the spokes
# Application ignores that drift; see apps/root/spokes.yaml).
#
# awsAuthConfig has no roleARN: Argo's pods authenticate with their ambient
# Pod Identity credentials (per-en1-admin-ack-argocd); authorization is the
# AccessEntry next to this file.
#
# tlsClientConfig.insecure is true at birth because the CA is unknowable
# until the cluster exists. Harden after bring-up: `task fleet:harden`
# prints the caData to commit here.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-per-en1-dev-clickhouse
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    fleet: spoke
    stage: dev
type: Opaque
stringData:
  name: per-en1-dev-clickhouse
  server: ""
  config: |
    {
      "awsAuthConfig": {
        "clusterName": "per-en1-dev-clickhouse"
      },
      "tlsClientConfig": {
        "insecure": true
      }
    }
